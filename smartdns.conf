# Dengarkan di port lokal 5353 (Hanya IPv4)
bind 127.0.0.1:5353

# ===================================================
# OPTIMASI CACHE & PERFORMA (ISP GRADE)
# ===================================================
# Kapasitas cache raksasa (Dinaikkan ke 300k. 100k agak kecil untuk trafik ISP, 
# 300k-500k sangat aman jika server RAM > 2GB).
cache-size 300000

# Simpan cache ke disk agar stabil dari mati lampu/restart
cache-persist yes
cache-file /tmp/smartdns.cache

# Optimasi Waktu Simpan (TTL) - KUNCI RESPONSIVITAS
# Memaksa domain bertahan minimal 5 menit di cache, mengurangi query berulang ke upstream.
rr-ttl-min 300
rr-ttl-max 86400
rr-ttl-reply-max 60

# Ambil ulang IP di belakang layar sebelum expired (Zero Latency)
prefetch-domain yes

# Tetap layani client pakai cache lama jika upstream mati sementara
serve-expired yes
serve-expired-ttl 86400

# Tingkatkan limit concurrent queries (Penting untuk trafik pelanggan ISP yang padat)
max-query-limit 4096

# Algoritma adu cepat (Ping & TCP Handshake ditambahkan port 80 untuk akurasi ekstra)
speed-check-mode ping,tcp:80,tcp:443

# ===================================================
# OPTIMASI KHUSUS IPv4 ONLY (DROP IPv6)
# ===================================================
# INI WAJIB DIAKTIFKAN: Mengembalikan SOA/Null untuk query AAAA (IPv6).
# Klien (HP/PC pelanggan) tidak akan menunggu timeout IPv6 dan langsung menggunakan IPv4.
# Ini adalah obat mujarab untuk delay loading di banyak device.
force-AAAA-SOA yes

# Pastikan dualstack mati (karena kita memblokir AAAA, fitur ini tidak berguna dan hanya membebani CPU)
#dualstack-ip-selection no


# ===================================================
# UPSTREAM SERVERS
# ===================================================
# Catatan: server-https (DoH) dan server-tls (DoT) sangat bagus untuk keamanan/anti-hijack, 
# tetapi enkripsi TLS menambah sedikit *overhead latency* (sekian milidetik). 
# Jika ingin "Adu Cepat" murni, saya sisipkan satu koneksi UDP murni sebagai pancingan pertama.

# -- CLOUDFLARE --
server-https https://1.1.1.3/dns-query 
server-https https://1.0.0.1/dns-query 

# -- GOOGLE --
# Hapus bootstrap-ip kalau udah ada ca-file, biar dia pake sistem standar
#server-https https://8.8.8.8/dns-query 
#server-https https://8.8.4.4/dns-query

# -- QUAD9 & OPEN DNS --
server-tls 9.9.9.9:853 
server-tls 208.67.222.222:853 


